<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編集・削除機能付き・長文穴埋め多肢選択アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background-color: #f4f6f9; color: #333; line-height: 1.6; }
.card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
h1, h2, h3 { color: #2c3e50; margin-top: 0; }
input[type="text"], input[type="email"], input[type="password"], select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: vertical; font-size: 16px; }
button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
button:hover { background-color: #27ae60; }
.nav-btn { background-color: #3498db; }
.nav-btn:hover { background-color: #2980b9; }
.auth-btn { background-color: #e67e22; }
.auth-btn:hover { background-color: #d35400; }

/* ナビゲーションタブのスタイル */
.tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
.tab-btn { flex: 1; padding: 12px; background-color: #bdc3c7; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
.tab-btn.active { background-color: #2c3e50; }

.passage-box { background: #eef2f7; padding: 20px; border-left: 5px solid #3498db; border-radius: 4px; font-size: 18px; margin-bottom: 25px; word-break: break-all; }
.blank-tag { background: #f1c40f; color: #333; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin: 0 4px; }
.quiz-item { border-top: 1px solid #eee; padding: 20px 0; }
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.choice-btn { background-color: #f8f9fa; color: #333; border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 15px; }
.choice-btn:hover { background-color: #e9ecef; }
.choice-btn.correct { background-color: #2ecc71 !important; color: white !important; border-color: #2ecc71; }
.choice-btn.wrong { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c; }
.result-status { font-weight: bold; margin-top: 5px; }

/* ジャンル一覧用スタイル */
.genre-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 4px; border-radius: 4px; }
.delete-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 13px; }
.delete-btn:hover { background-color: #c0392b; }

/* クイズ回答後の解説ボックスのスタイル */
.explanation-box { margin-top: 8px; padding: 12px; background: #fffde7; border-left: 4px solid #f1c40f; font-size: 15px; color: #444 !important; border-radius: 4px; line-height: 1.5; font-weight: normal; }
</style>
</head>
<body>

<h1>📚 長文穴埋め一括クイズ</h1>

<div class="tab-container">
  <button id="tab-quiz" class="tab-btn active" onclick="switchView('quiz')">🎯 クイズに挑戦</button>
  <button id="tab-admin" class="tab-btn" onclick="switchView('admin')">🛠️ 問題を管理・登録</button>
</div>

<div id="view-quiz">
  <div class="card">
    <h2>🎯 クイズに挑戦</h2>
    <label for="genre-select" style="font-weight: bold;">ジャンルを選択してください：</label>
    <select id="genre-select">
      <option value="all">🌍 全ジャンルから出題</option>
    </select>
    <button class="nav-btn" onclick="startPassageQuiz()" style="margin-top: 10px; width: 100%;">ランダムに出題</button>
    
    <div id="quiz-area" style="display: none; margin-top: 25px;">
      <h3>問題文</h3>
      <div id="passage-text" class="passage-box"></div>
      <h3>問題リスト</h3>
      <div id="quiz-list"></div>
    </div>
  </div>
</div>

<div id="view-admin" style="display: none;">
  <div id="login-area" class="card">
    <h2>🔒 管理者ログイン</h2>
    <p style="font-size: 14px; color: #666;">問題を新しく登録する場合はログインしてください。</p>
    <input type="email" id="login-email" placeholder="メールアドレス">
    <input type="password" id="login-password" placeholder="パスワード">
    <button class="auth-btn" onclick="login()">ログイン</button>
    <p id="login-msg" style="font-weight: bold; margin-top: 10px; color: #666;">ステータス: 待機中</p>
  </div>

  <div id="register-area" style="display: none;">
    
    <div class="card">
      <h2>📁 ジャンルの管理</h2>
      <p style="font-size: 14px; color: #666; margin-bottom: 10px;">クイズのカテゴリとなるジャンルを登録・削除できます。</p>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" id="new-genre-input" placeholder="新しいジャンル名を入力" style="margin: 0;">
        <button onclick="registerGenre()" style="white-space: nowrap;">ジャンルを追加</button>
      </div>
      
      <div id="genre-list-admin" style="margin-top: 15px; max-height: 180px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 4px; background: #fafafa;"></div>
    </div>

    <div class="card">
      <h2>📝 新しい長文を登録</h2>
      
      <label style="font-weight: bold;">ジャンルを選択：</label>
      <select id="genre-select-admin">
        <option value="">-- 先にジャンルを追加してください --</option>
      </select>
      
      <label style="font-weight: bold; margin-top: 15px; display: block;">問題文：</label>
      <p style="font-size: 14px; color: #666; margin: 4px 0;">問題にしたい部分を <b>【単語】</b> のようにカッコで囲んで入力してください。</p>
      <textarea id="passage-input" placeholder="例：明確な幾何学形態や空間を実現しようとする造形運動「【デ・ステイル】」の構成原理に基づき、【無彩色】と青・赤・黄の三原色とで鮮やかに彩魚された面と線の要素が組合わされている。"></textarea>
      
      <button type="button" class="nav-btn" onclick="generateExplanationFields()" style="margin-top: 10px; width: 100%; background-color: #e67e22;">① 穴埋めワードを抽出して解説欄を作る</button>
      
      <div id="explanation-inputs-container" style="margin-top: 15px;"></div>
      
      <hr style="margin: 25px 0; border: 0; border-top: 1px dashed #ccc;">
      
      <button onclick="registerPassage()" style="width: 100%;">② 文章と解説をまとめて登録する</button>
    </div>

    <div class="card">
      <h2>🛠️ 登録済み問題の管理（編集・削除）</h2>
      <label style="font-weight: bold;">ジャンルで絞り込み：</label>
      <select id="genre-filter-admin" onchange="renderAdminPassageList()">
        <option value="all">🌍 すべての問題を表示</option>
      </select>
      
      <div id="admin-passage-list" style="margin-top: 15px; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 4px; background: #fafafa;">
        </div>
      <p id="register-msg" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
    </div>

  </div>
</div>

<script>
window.addEventListener('error', function(e) {
  alert('システムエラーが発生しました:\n' + e.message + '\n行番号: ' + e.lineno);
});

const SUPABASE_URL = 'https://zeqnwzdbslcwyfoezjif.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Xg497Gg0I1FLsIlY98fxKw_MLHJMjyj';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let allPassages = [];
let allGenres = [];

function switchView(viewName) {
  const viewQuiz = document.getElementById('view-quiz');
  const viewAdmin = document.getElementById('view-admin');
  const tabQuiz = document.getElementById('tab-quiz');
  const tabAdmin = document.getElementById('tab-admin');

  if (viewName === 'quiz') {
    viewQuiz.style.display = 'block';
    viewAdmin.style.display = 'none';
    tabQuiz.classList.add('active');
    tabAdmin.classList.remove('active');
  } else {
    viewQuiz.style.display = 'none';
    viewAdmin.style.display = 'block';
    tabQuiz.classList.remove('active');
    tabAdmin.classList.add('active');
  }
}

// ドロップダウンUIの更新（管理用フィルターのドロップダウンも合わせて更新）
function updateGenreUI() {
  const quizSelect = document.getElementById('genre-select');
  const currentQuizValue = quizSelect.value || 'all';
  quizSelect.innerHTML = '<option value="all">🌍 全ジャンルから出題</option>';

  const adminSelect = document.getElementById('genre-select-admin');
  adminSelect.innerHTML = allGenres.length === 0 
    ? '<option value="">-- 先にジャンルを追加してください --</option>' 
    : '<option value="">-- ジャンルを選択してください --</option>';

  const filterSelect = document.getElementById('genre-filter-admin');
  const currentFilterValue = filterSelect ? filterSelect.value : 'all';
  if (filterSelect) {
    filterSelect.innerHTML = '<option value="all">🌍 すべての問題を表示</option>';
  }

  allGenres.forEach(g => {
    const optQuiz = document.createElement('option');
    optQuiz.value = g.name;
    optQuiz.textContent = g.name;
    quizSelect.appendChild(optQuiz);

    const optAdmin = document.createElement('option');
    optAdmin.value = g.name;
    optAdmin.textContent = g.name;
    adminSelect.appendChild(optAdmin);

    if (filterSelect) {
      const optFilter = document.createElement('option');
      optFilter.value = g.name;
      optFilter.textContent = g.name;
      filterSelect.appendChild(optFilter);
    }
  });

  if ([...quizSelect.options].some(opt => opt.value === currentQuizValue)) {
    quizSelect.value = currentQuizValue;
  } else {
    quizSelect.value = 'all';
  }

  if (filterSelect) {
    if ([...filterSelect.options].some(opt => opt.value === currentFilterValue)) {
      filterSelect.value = currentFilterValue;
    } else {
      filterSelect.value = 'all';
    }
  }

  const listContainer = document.getElementById('genre-list-admin');
  listContainer.innerHTML = '';
  if (allGenres.length === 0) {
    listContainer.innerHTML = '<p style="color: #999; margin: 0; font-size: 14px;">登録されたジャンルはありません。</p>';
    return;
  }

  allGenres.forEach(g => {
    const item = document.createElement('div');
    item.className = 'genre-item';
    item.innerHTML = `
      <span style="font-weight: bold;">${g.name}</span>
      <button class="delete-btn" onclick="deleteGenre('${g.id}', '${g.name}')">❌ 削除</button>
    `;
    listContainer.appendChild(item);
  });
}

async function fetchGenres() {
  try {
    const { data, error } = await supabaseClient.from('genres').select('*').order('name', { ascending: true });
    if (data) {
      allGenres = data;
      updateGenreUI();
    }
  } catch (e) {
    console.error(e);
  }
}

async function registerGenre() {
  const name = document.getElementById('new-genre-input').value.trim();
  if (!name) {
    alert("ジャンル名を入力してください。");
    return;
  }
  if (allGenres.some(g => g.name === name)) {
    alert("そのジャンルは既に登録されています。");
    return;
  }
  
  const { error } = await supabaseClient.from('genres').insert([{ name: name }]);
  if (error) {
    alert("ジャンルの登録に失敗しました: " + error.message);
  } else {
    document.getElementById('new-genre-input').value = '';
    await fetchGenres();
  }
}

async function deleteGenre(id, name) {
  if (!confirm(`ジャンル「${name}」を削除しますか？\n⚠️ このジャンルに登録されているクイズ問題もすべて一緒に削除されます！`)) {
    return;
  }

  const { error: pError } = await supabaseClient.from('passages').delete().eq('genre', name);
  if (pError) {
    alert("紐づく問題の削除に失敗しました: " + pError.message);
    return;
  }

  const { error: gError } = await supabaseClient.from('genres').delete().eq('id', id);
  if (gError) {
    alert("ジャンルの削除に失敗しました: " + gError.message);
  } else {
    await fetchGenres();
    await fetchPassages();
  }
}

function generateExplanationFields() {
  const content = document.getElementById('passage-input').value;
  const container = document.getElementById('explanation-inputs-container');
  container.innerHTML = '';

  if (!content.includes('【') || !content.includes('】')) {
    alert("問題文の中に、問題にしたい箇所（【単語】）を1つ以上入力してください。");
    return;
  }

  const matches = content.match(/【(.*?)】/g);
  if (!matches) return;

  const words = [...new Set(matches.map(m => m.replace(/【|】/g, '')))];

  const title = document.createElement('h3');
  title.style.fontSize = '16px';
  title.style.marginTop = '15px';
  title.textContent = '💡 各キーワードの解説を入力（空欄でもOK）';
  container.appendChild(title);

  words.forEach(word => {
    const div = document.createElement('div');
    div.style.marginBottom = '12px';
    div.innerHTML = `
      <label style="font-size: 14px; font-weight: bold; color: #2c3e50;">▼「${word}」の解説</label>
      <input type="text" class="explanation-word-input" data-word="${word}" placeholder="解答後に表示される解説文を入力してください">
    `;
    container.appendChild(div);
  });
}

// 【新規追加】問題一覧を動的に生成するロジック
function renderAdminPassageList() {
  const filterGenre = document.getElementById('genre-filter-admin').value;
  const listContainer = document.getElementById('admin-passage-list');
  listContainer.innerHTML = '';

  const filtered = filterGenre === 'all' 
    ? allPassages 
    : allPassages.filter(p => p.genre === filterGenre);

  if (filtered.length === 0) {
    listContainer.innerHTML = '<p style="color: #999; font-size: 14px; text-align: center; margin: 20px 0;">該当する問題は登録されていません。</p>';
    return;
  }

  filtered.forEach(p => {
    const itemDiv = document.createElement('div');
    itemDiv.id = `passage-admin-item-${p.id}`;
    itemDiv.style.border = '1px solid #ddd';
    itemDiv.style.padding = '15px';
    itemDiv.style.borderRadius = '6px';
    itemDiv.style.marginBottom = '12px';
    itemDiv.style.background = '#fff';

    itemDiv.innerHTML = `
      <div id="passage-view-${p.id}">
        <span style="background: #3498db; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold;">${p.genre}</span>
        <p style="margin: 10px 0; font-size: 14px; white-space: pre-wrap; color: #333; word-break: break-all;">${p.content}</p>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
          <button onclick="openEditForm('${p.id}')" style="background-color: #3498db; font-size: 13px; padding: 6px 12px;">✏️ 編集する</button>
          <button onclick="deletePassage('${p.id}')" class="delete-btn" style="font-size: 13px; padding: 6px 12px; margin:0;">❌ 削除</button>
        </div>
      </div>
      <div id="passage-edit-${p.id}" style="display: none;"></div>
    `;
    listContainer.appendChild(itemDiv);
  });
}

// 【新規追加】インライン編集フォームを開く
function openEditForm(id) {
  const p = allPassages.find(item => item.id == id);
  if (!p) return;

  document.getElementById(`passage-view-${id}`).style.display = 'none';
  const editArea = document.getElementById(`passage-edit-${id}`);
  editArea.style.display = 'block';

  let genreOptions = '';
  allGenres.forEach(g => {
    genreOptions += `<option value="${g.name}" ${g.name === p.genre ? 'selected' : ''}>${g.name}</option>`;
  });

  editArea.innerHTML = `
    <h3 style="font-size: 16px; margin-bottom: 10px; color: #e67e22;">✏️ 問題の編集</h3>
    
    <label style="font-weight: bold; font-size: 13px;">ジャンルを変更：</label>
    <select id="edit-genre-${id}" style="font-size: 14px; padding: 6px;">${genreOptions}</select>

    <label style="font-weight: bold; font-size: 13px; display: block; margin-top: 10px;">問題文を変更：</label>
    <textarea id="edit-content-${id}" style="height: 100px; font-size: 14px;">${p.content}</textarea>
    
    <button type="button" class="nav-btn" onclick="generateEditExplanationFields('${id}')" style="margin-top: 5px; font-size: 13px; padding: 6px 12px; background-color: #e67e22; width: 100%;">① 本文の【】から解説欄を更新・再生成</button>
    
    <div id="edit-explanation-container-${id}" style="margin-top: 10px; background: #fdfefe; padding: 8px; border: 1px dashed #ccc; border-radius:4px;"></div>

    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button onclick="savePassageEdit('${id}')" style="background-color: #2ecc71; font-size: 14px; padding: 8px 16px; flex: 1;">💾 変更を保存</button>
      <button onclick="closeEditForm('${id}')" style="background-color: #95a5a6; font-size: 14px; padding: 8px 16px; flex: 1;">キャンセル</button>
    </div>
  `;

  // 初回の解説欄描画
  generateEditExplanationFields(id, p.explanations);
}

// 【新規追加】編集フォーム用の解説入力欄生成ロジック（手動で叩かれた時は直前の入力を保持する）
function generateEditExplanationFields(id, existingExplanations = null) {
  const content = document.getElementById(`edit-content-${id}`).value;
  const container = document.getElementById(`edit-explanation-container-${id}`);

  const matches = content.match(/【(.*?)】/g);
  if (!matches) {
    container.innerHTML = '<p style="color: red; font-size: 13px; margin:0;">⚠️ 本文中に【単語】が見つかりません。</p>';
    return;
  }
  const words = [...new Set(matches.map(m => m.replace(/【|】/g, '')))];

  // すでに編集画面の入力欄に入力されている値を一時回収
  const currentInputs = document.querySelectorAll(`.edit-explanation-word-input-${id}`);
  const tempObj = {};
  currentInputs.forEach(input => {
    tempObj[input.getAttribute('data-word')] = input.value;
  });

  container.innerHTML = '';

  let expObj = existingExplanations;
  if (!expObj) {
    // 既存データが渡されなかった（手動でボタンを押した）場合は、入力中の値(tempObj)を優先し、無ければDBの元データを引き継ぐ
    const p = allPassages.find(item => item.id == id);
    const originalObj = (p && p.explanations) ? (typeof p.explanations === 'string' ? JSON.parse(p.explanations) : p.explanations) : {};
    expObj = Object.assign({}, originalObj, tempObj);
  }

  if (typeof expObj === 'string') {
    try { expObj = JSON.parse(expObj); } catch (e) { expObj = {}; }
  }
  if (!expObj) expObj = {};

  words.forEach(word => {
    const div = document.createElement('div');
    div.style.marginBottom = '8px';
    const currentVal = expObj[word] || '';
    div.innerHTML = `
      <label style="font-size: 13px; font-weight: bold; color: #2c3e50;">▼「${word}」の解説</label>
      <input type="text" class="edit-explanation-word-input-${id}" data-word="${word}" value="${currentVal}" placeholder="解説文を入力してください" style="padding: 6px; font-size: 14px; margin: 2px 0;">
    `;
    container.appendChild(div);
  });
}

// 【新規追加】編集フォームを閉じる
function closeEditForm(id) {
  document.getElementById(`passage-view-${id}`).style.display = 'block';
  document.getElementById(`passage-edit-${id}`).style.display = 'none';
  document.getElementById(`passage-edit-${id}`).innerHTML = '';
}

// 【新規追加】編集したデータをSupabaseに保存する
async function savePassageEdit(id) {
  const genre = document.getElementById(`edit-genre-${id}`).value;
  const content = document.getElementById(`edit-content-${id}`).value;

  if (!genre) { alert("ジャンルを選択してください。"); return; }
  if (!content) { alert("文章を入力してください。"); return; }
  if (!content.includes('【') || !content.includes('】')) { alert("問題にする箇所を【単語】で囲んでください。"); return; }

  const expInputs = document.querySelectorAll(`.edit-explanation-word-input-${id}`);
  const explanationsObj = {};
  expInputs.forEach(input => {
    const word = input.getAttribute('data-word');
    explanationsObj[word] = input.value.trim();
  });

  const { error } = await supabaseClient
    .from('passages')
    .update({ genre: genre, content: content, explanations: explanationsObj })
    .eq('id', id);

  if (error) {
    alert("修正の保存に失敗しました: " + error.message);
  } else {
    alert("問題を修正しました！");
    await fetchPassages(); // これにより再取得＆一覧の再描画が走ります
  }
}

// 【新規追加】問題を1件削除する
async function deletePassage(id) {
  if (!confirm("このクイズ問題を削除してもよろしいですか？\n(この操作は取り消せません)")) {
    return;
  }

  const { error } = await supabaseClient.from('passages').delete().eq('id', id);
  if (error) {
    alert("問題の削除に失敗しました: " + error.message);
  } else {
    await fetchPassages();
  }
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const msgEl = document.getElementById('login-msg');
  msgEl.textContent = "⏳ ログイン中...";
  msgEl.style.color = "blue";
  if (!email || !password) {
    alert("メールアドレスとパスワードを入力してください。");
    msgEl.textContent = "ステータス: 待機中";
    msgEl.style.color = "#666";
    return;
  }
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      msgEl.textContent = "❌ ログイン失敗: " + error.message;
      msgEl.style.color = "red";
    } else {
      msgEl.textContent = "🎉 ログイン成功！";
      msgEl.style.color = "green";
      await checkUser();
    }
  } catch (err) {
    msgEl.textContent = "💥 エラー発生: " + err.message;
    msgEl.style.color = "red";
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  const msgEl = document.getElementById('login-msg');
  msgEl.textContent = "ステータス: 待機中";
  msgEl.style.color = "#666";
  await checkUser();
}

async function checkUser() {
  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const loginArea = document.getElementById('login-area');
    const registerArea = document.getElementById('register-area');
    if (user) {
      loginArea.style.display = 'none';
      registerArea.style.display = 'block';
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
    } else {
      loginArea.style.display = 'block';
      registerArea.style.display = 'none';
    }
  } catch (e) {
    console.error(e);
  }
}

async function registerPassage() {
  const genre = document.getElementById('genre-select-admin').value;
  const content = document.getElementById('passage-input').value;
  const msgEl = document.getElementById('register-msg');
  
  if (!genre) { alert("ジャンルを選択してください。"); return; }
  if (!content) { alert("文章を入力してください。"); return; }
  
  const expInputs = document.querySelectorAll('.explanation-word-input');
  if (expInputs.length === 0 && (content.includes('【') && content.includes('】'))) {
    alert("「① 穴埋めワードを抽出して解説欄を作る」ボタンを先に押して、解説欄を準備してください。");
    return;
  }

  const explanationsObj = {};
  expInputs.forEach(input => {
    const word = input.getAttribute('data-word');
    explanationsObj[word] = input.value.trim();
  });
  
  const { data, error } = await supabaseClient
    .from('passages')
    .insert([{ genre: genre, content: content, explanations: explanationsObj }]);
    
  if (error) {
    msgEl.textContent = "エラー: " + error.message;
    msgEl.style.color = "red";
  } else {
    msgEl.textContent = "長文と解説を登録しました！";
    msgEl.style.color = "green";
    document.getElementById('passage-input').value = '';
    document.getElementById('explanation-inputs-container').innerHTML = '';
    await fetchPassages();
  }
}

async function fetchPassages() {
  try {
    const { data, error } = await supabaseClient.from('passages').select('*');
    if (data) {
      allPassages = data;
      renderAdminPassageList(); // 【追加】データ取得時に管理画面用の一覧も同期
    }
  } catch (e) {
    console.error(e);
  }
}

async function startPassageQuiz() {
  if (allPassages.length === 0) {
    alert("まずは文章を登録してください。");
    return;
  }

  const selectedGenre = document.getElementById('genre-select').value;
  
  let genrePassages = [];
  if (selectedGenre === 'all' || !selectedGenre) {
    genrePassages = allPassages;
  } else {
    genrePassages = allPassages.filter(p => p.genre === selectedGenre);
  }

  if (genrePassages.length === 0) {
    alert("選択されたジャンルには、まだ問題が1件も登録されていません。");
    return;
  }

  let wordPool = [];
  genrePassages.forEach(p => {
    const matches = p.content.match(/【(.*?)】/g);
    if (matches) {
      matches.forEach(m => wordPool.push(m.replace(/【|】/g, '')));
    }
  });
  wordPool = [...new Set(wordPool)];

  if (wordPool.length < 4) {
    const scopeText = (selectedGenre === 'all') ? "アプリ全体" : `ジャンル「${selectedGenre}」内`;
    alert(`四択を作るため、${scopeText}に異なる【単語】が最低4つ以上登録されている必要があります（現在: ${wordPool.length}つ）。問題を増やすか、【】の箇所を増やしてください。`);
    return;
  }

  const targetPassage = genrePassages[Math.floor(Math.random() * genrePassages.length)];
  const correctAnswers = [];
  const regex = /【(.*?)】/g;
  let match;
  while ((match = regex.exec(targetPassage.content)) !== null) {
    correctAnswers.push(match[1]);
  }
  
  let qCount = 0;
  const displayHTML = targetPassage.content.replace(/【(.*?)】/g, () => {
    qCount++;
    return `<span class="blank-tag">(${qCount})</span>`;
  });
  document.getElementById('passage-text').innerHTML = displayHTML;
  
  const quizListDiv = document.getElementById('quiz-list');
  quizListDiv.innerHTML = '';
  
  correctAnswers.forEach((correctWord, index) => {
    const questionNumber = index + 1;
    let wrongChoices = wordPool.filter(word => word !== correctWord);
    wrongChoices.sort(() => 0.5 - Math.random());
    let choices = [correctWord, ...wrongChoices.slice(0, 3)];
    choices.sort(() => 0.5 - Math.random());
    
    let targetExplanations = targetPassage.explanations;
    if (typeof targetExplanations === 'string') {
      try {
        targetExplanations = JSON.parse(targetExplanations);
      } catch (e) {
        targetExplanations = {};
      }
    }

    const explanationText = (targetExplanations && targetExplanations[correctWord]) 
      ? targetExplanations[correctWord] 
      : '（このキーワードには個別の解説が登録されていません）';

    const quizItem = document.createElement('div');
    quizItem.className = 'quiz-item';
    quizItem.innerHTML = `
      <h4>問 ${questionNumber}. カッコ (${questionNumber}) に入る言葉は？</h4>
      <div class="choice-grid" id="grid-${questionNumber}"></div>
      <div class="result-status" id="status-${questionNumber}"></div>
    `;
    quizListDiv.appendChild(quizItem);
    
    const grid = document.getElementById(`grid-${questionNumber}`);
    choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(btn, choice, correctWord, questionNumber, explanationText);
      grid.appendChild(btn);
    });
  });
  document.getElementById('quiz-area').style.display = 'block';
}

function checkAnswer(selectedBtn, selectedWord, correctWord, qNum, explanation) {
  const grid = document.getElementById(`grid-${qNum}`);
  const status = document.getElementById(`status-${qNum}`);
  const buttons = grid.querySelectorAll('.choice-btn');
  buttons.forEach(btn => btn.disabled = true);
  
  const explanationHTML = `<div class="explanation-box"><b>💡 解説：</b>${explanation}</div>`;

  if (selectedWord === correctWord) {
    selectedBtn.classList.add('correct');
    status.innerHTML = `⭕ 正解！${explanationHTML}`;
    status.style.color = "#2ecc71";
  } else {
    selectedBtn.classList.add('wrong');
    status.innerHTML = `❌ 不正解... 正解は「${correctWord}」です。${explanationHTML}`;
    status.style.color = "#e74c3c";
    buttons.forEach(btn => {
      if (btn.textContent === correctWord) btn.classList.add('correct');
    });
  }
}

window.onload = async function() {
  await checkUser();
  await fetchGenres();
  await fetchPassages();
};
</script>
