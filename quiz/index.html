<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長文穴埋め多肢選択アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background-color: #f4f6f9; color: #333; line-height: 1.6; }
.card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
h1, h2, h3 { color: #2c3e50; margin-top: 0; }
input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: vertical; font-size: 16px; }
button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
button:hover { background-color: #27ae60; }
.nav-btn { background-color: #3498db; }
.nav-btn:hover { background-color: #2980b9; }
.auth-btn { background-color: #e67e22; }
.auth-btn:hover { background-color: #d35400; }
.passage-box { background: #eef2f7; padding: 20px; border-left: 5px solid #3498db; border-radius: 4px; font-size: 18px; margin-bottom: 25px; word-break: break-all; }
.blank-tag { background: #f1c40f; color: #333; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin: 0 4px; }
.quiz-item { border-top: 1px solid #eee; padding: 20px 0; }
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.choice-btn { background-color: #f8f9fa; color: #333; border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 15px; }
.choice-btn:hover { background-color: #e9ecef; }
.choice-btn.correct { background-color: #2ecc71 !important; color: white !important; border-color: #2ecc71; }
.choice-btn.wrong { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c; }
.result-status { font-weight: bold; margin-top: 5px; }
</style>
</head>
<body>

<h1>📚 長文穴埋め一括クイズ</h1>

<div id="login-area" class="card">
<h2>🔒 管理者ログイン（問題登録用）</h2>
<p style="font-size: 14px; color: #666;">問題を新しく登録する場合はログインしてください。解くだけならログインは不要です。</p>
<input type="email" id="login-email" placeholder="メールアドレス">
<input type="password" id="login-password" placeholder="パスワード">
<button class="auth-btn" onclick="login()">ログイン</button>
<p id="login-msg" style="font-weight: bold; margin-top: 10px; color: #666;">ステータス: 待機中</p>
</div>

<div id="register-area" class="card" style="display: none;">
<h2>📝 新しい長文を登録</h2>
<p style="font-size: 14px; color: #666;">問題にしたい部分を <b>【単語】</b> のようにカッコで囲んで入力してください。</p>
<textarea id="passage-input" placeholder="例：明確な幾何学形態や空間を実現しようとする造形運動「【デ・ステイル】」の構成原理に基づき、【無彩色】と青・赤・黄の三原色とで鮮やかに彩魚された面と線の要素が組合わされている。"></textarea>
<button onclick="registerPassage()" style="margin-top: 10px;">文章を登録する</button>
<button class="auth-btn" onclick="logout()" style="margin-top: 10px; background-color: #95a5a6;">ログアウト</button>
<p id="register-msg"></p>
</div>

<div class="card">
<h2>🎯 クイズに挑戦</h2>
<button class="nav-btn" onclick="startPassageQuiz()">ランダムに出題</button>
<div id="quiz-area" style="display: none; margin-top: 25px;">
<h3>問題文</h3>
<div id="passage-text" class="passage-box"></div>
<h3>問題リスト</h3>
<div id="quiz-list"></div>
</div>
</div>

<script>
// 万が一のエラーを画面に強制ポップアップさせる仕組み
window.addEventListener('error', function(e) {
alert('システムエラーが発生しました:\n' + e.message + '\n行番号: ' + e.lineno);
});

const SUPABASE_URL = 'https://zeqnwzdbslcwyfoezjif.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Xg497Gg0I1FLsIlY98fxKw_MLHJMjyj';

// 変数名の衝突を完全に回避
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let allPassages = [];

async function login() {
const email = document.getElementById('login-email').value;
const password = document.getElementById('login-password').value;
const msgEl = document.getElementById('login-msg');
msgEl.textContent = "⏳ ログイン中...";
msgEl.style.color = "blue";
if (!email || !password) {
alert("メールアドレスとパスワードを入力してください。");
msgEl.textContent = "ステータス: 待機中";
msgEl.style.color = "#666";
return;
}
try {
const { data, error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: password
});
if (error) {
msgEl.textContent = "❌ ログイン失敗: " + error.message;
msgEl.style.color = "red";
} else {
msgEl.textContent = "🎉 ログイン成功！";
msgEl.style.color = "green";
await checkUser();
}
} catch (err) {
msgEl.textContent = "💥 エラー発生: " + err.message;
msgEl.style.color = "red";
}
}

async function logout() {
await supabaseClient.auth.signOut();
const msgEl = document.getElementById('login-msg');
msgEl.textContent = "ステータス: 待機中";
msgEl.style.color = "#666";
await checkUser();
}

async function checkUser() {
try {
const { data: { user } } = await supabaseClient.auth.getUser();
const loginArea = document.getElementById('login-area');
const registerArea = document.getElementById('register-area');
if (user) {
loginArea.style.display = 'none';
registerArea.style.display = 'block';
document.getElementById('login-email').value = '';
document.getElementById('login-password').value = '';
} else {
loginArea.style.display = 'block';
registerArea.style.display = 'none';
}
} catch (e) {
console.error(e);
}
}

async function registerPassage() {
const content = document.getElementById('passage-input').value;
const msgEl = document.getElementById('register-msg');
if (!content) {
alert("文章を入力してください。");
return;
}
if (!content.includes('【') || !content.includes('】')) {
alert("問題にする箇所を【単語】で囲んでください。");
return;
}
const { data, error } = await supabaseClient
.from('passages')
.insert([{ content: content }]);
if (error) {
msgEl.textContent = "エラー: " + error.message;
msgEl.style.color = "red";
} else {
msgEl.textContent = "長文を登録しました！";
msgEl.style.color = "green";
document.getElementById('passage-input').value = '';
await fetchPassages();
}
}

async function fetchPassages() {
try {
const { data, error } = await supabaseClient.from('passages').select('*');
if (data) allPassages = data;
} catch (e) {
console.error(e);
}
}

async function startPassageQuiz() {
await fetchPassages();
if (allPassages.length === 0) {
alert("まずは文章を登録してください。");
return;
}
let wordPool = [];
allPassages.forEach(p => {
const matches = p.content.match(/【(.*?)】/g);
if (matches) {
matches.forEach(m => wordPool.push(m.replace(/【|】/g, '')));
}
});
wordPool = [...new Set(wordPool)];
if (wordPool.length < 4) {
alert("四択を作るため、アプリ全体で異なる【単語】が最低4つ以上登録されている必要があります。もっと文章を登録するか、【】の箇所を増やしてください。");
return;
}
const targetPassage = allPassages[Math.floor(Math.random() * allPassages.length)];
const correctAnswers = [];
const regex = /【(.*?)】/g;
let match;
while ((match = regex.exec(targetPassage.content)) !== null) {
correctAnswers.push(match[1]);
}
let qCount = 0;
const displayHTML = targetPassage.content.replace(/【(.*?)】/g, () => {
qCount++;
return `<span class="blank-tag">(${qCount})</span>`;
});
document.getElementById('passage-text').innerHTML = displayHTML;
const quizListDiv = document.getElementById('quiz-list');
quizListDiv.innerHTML = '';
correctAnswers.forEach((correctWord, index) => {
const questionNumber = index + 1;
let wrongChoices = wordPool.filter(word => word !== correctWord);
wrongChoices.sort(() => 0.5 - Math.random());
let choices = [correctWord, ...wrongChoices.slice(0, 3)];
choices.sort(() => 0.5 - Math.random());
const quizItem = document.createElement('div');
quizItem.className = 'quiz-item';
quizItem.innerHTML = `
<h4>問 ${questionNumber}. カッコ (${questionNumber}) に入る言葉は？</h4>
<div class="choice-grid" id="grid-${questionNumber}"></div>
<div class="result-status" id="status-${questionNumber}"></div>
`;
quizListDiv.appendChild(quizItem);
const grid = document.getElementById(`grid-${questionNumber}`);
choices.forEach(choice => {
const btn = document.createElement('button');
btn.className = 'choice-btn';
btn.textContent = choice;
btn.onclick = () => checkAnswer(btn, choice, correctWord, questionNumber);
grid.appendChild(btn);
});
});
document.getElementById('quiz-area').style.display = 'block';
}

function checkAnswer(selectedBtn, selectedWord, correctWord, qNum) {
const grid = document.getElementById(`grid-${qNum}`);
const status = document.getElementById(`status-${qNum}`);
const buttons = grid.querySelectorAll('.choice-btn');
buttons.forEach(btn => btn.disabled = true);
if (selectedWord === correctWord) {
selectedBtn.classList.add('correct');
status.textContent = "⭕ 正解！";
status.style.color = "#2ecc71";
} else {
selectedBtn.classList.add('wrong');
status.textContent = `❌ 不正解... 正解は「${correctWord}」です。`;
status.style.color = "#e74c3c";
buttons.forEach(btn => {
if (btn.textContent === correctWord) btn.classList.add('correct');
});
}
}

window.onload = async function() {
await checkUser();
await fetchPassages();
};
</script>
</body>
</html>
